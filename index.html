<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>정휘 아카이브</title>

<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&display=swap');

:root {
  --bg: #ffffff; --bg-sec: #f8fbff; --bg-card: #ffffff;
  --brd: #e0f0ff; --txt: #334155; --txt-sub: #64748b; --txt-dim: #94a3b8;
  --accent: #38bdf8; --accent-hov: #0ea5e9; --accent-dim: #e0f2fe;
  --nav-h: 60px; --shadow: 0 4px 20px rgba(56, 189, 248, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--txt); font-family: 'Pretendard', sans-serif; line-height: 1.6; overflow-x: hidden; }

/* NAVIGATION */
.navbar { position: fixed; top: 0; left: 0; width: 100%; height: var(--nav-h); background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--brd); z-index: 1000; display: flex; justify-content: center; align-items: center; gap: 20px; }
.nav-link { color: var(--txt-sub); text-decoration: none; font-size: 14px; font-weight: 600; padding: 8px 12px; border-radius: 6px; transition: all 0.2s; }
.nav-link:hover, .nav-link.active { color: var(--accent); background: var(--accent-dim); }

/* SECTIONS & COMMON */
section { min-height: 100vh; padding: calc(var(--nav-h) + 60px) 20px 60px; max-width: 800px; margin: 0 auto; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 2px solid var(--accent-dim); padding-bottom: 12px; }
.section-title { font-family: 'IBM Plex Sans KR', sans-serif; font-size: 24px; font-weight: 700; color: var(--txt); }
.btn { background: var(--bg-card); border: 1px solid var(--accent); color: var(--accent); padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; transition: 0.2s; font-family: inherit; text-decoration: none; display: inline-block; text-align: center; }
.btn:hover, .btn.prim { background: var(--accent); color: #fff; }
.btn.prim:hover { background: var(--accent-hov); }

/* 1. HERO */
#home { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
.hero-img { width: 180px; height: 180px; border-radius: 50%; background: var(--bg-sec); border: 3px solid var(--accent-dim); margin-bottom: 24px; object-fit: cover; box-shadow: var(--shadow); }
.hero-title { font-family: 'IBM Plex Sans KR', sans-serif; font-size: 32px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
.total-count { font-size: 40px; font-weight: 700; color: var(--accent); font-family: 'IBM Plex Sans KR', sans-serif; margin: 20px 0; }

/* 2. FILMOGRAPHY */
.filmo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
.filmo-card { background: var(--bg-card); border: 1px solid var(--brd); border-radius: 16px; padding: 24px; box-shadow: var(--shadow); transition: transform 0.2s; }
.filmo-card:hover { transform: translateY(-5px); border-color: var(--accent); }
.filmo-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; color: var(--txt); }
.filmo-char { font-size: 14px; color: var(--accent); margin-bottom: 16px; font-weight: 600; }
.season-list { display: flex; flex-direction: column; gap: 8px; }
.season-btn { display: block; padding: 10px; background: var(--bg-sec); border: 1px solid var(--brd); color: var(--txt-sub); text-decoration: none; font-size: 13px; border-radius: 8px; transition: 0.2s; text-align: center; cursor: pointer; font-weight: 600; border-width: 1px; }
.season-btn:hover { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-dim); }

/* 3. DASHBOARD */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--bg-card); border: 1px solid var(--brd); border-radius: 16px; padding: 24px; text-align: center; box-shadow: var(--shadow); }
.stat-label { font-size: 13px; color: var(--txt-sub); margin-bottom: 8px; font-weight: 600; }
.stat-value { font-size: 28px; font-weight: 700; font-family: 'IBM Plex Sans KR', sans-serif; color: var(--accent); }

/* 4. GALLERY & 5. LOG */
.gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }
.video-wrapper { position: relative; width: 100%; padding-bottom: 56.25%; border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--brd); }
.video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
.delete-btn { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.9); border: none; width: 28px; height: 28px; border-radius: 50%; color: #ef4444; cursor: pointer; z-index: 10; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.timeline { border-left: 2px solid var(--accent-dim); margin-left: 10px; padding-left: 24px; position: relative; }
.log-item { margin-bottom: 30px; position: relative; }
.log-item::before { content: ''; position: absolute; left: -31px; top: 4px; width: 12px; height: 12px; background: #fff; border: 3px solid var(--accent); border-radius: 50%; }
.log-date { font-size: 13px; color: var(--txt-sub); margin-bottom: 6px; font-weight: 600; }
.log-content { background: var(--bg-card); border: 1px solid var(--brd); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); position: relative; }
.log-title { font-weight: 700; margin-bottom: 8px; color: var(--txt); font-size: 16px; }
.log-memo { font-size: 14px; color: var(--txt-sub); line-height: 1.6; white-space: pre-wrap; }
.log-del { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--txt-dim); cursor: pointer; font-size: 12px; }

/* MODALS */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(3px); }
.overlay.show { display: flex; }
.modal { background: var(--bg-card); width: 100%; max-width: 400px; padding: 24px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-height: 90vh; overflow-y: auto; }
.modal.large { max-width: 600px; }
.modal-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; color: var(--txt); display: flex; justify-content: space-between; align-items: center; }
.modal-close { background: none; border: none; font-size: 24px; color: var(--txt-dim); cursor: pointer; }
.modal-subtitle { font-size: 14px; font-weight: 700; color: var(--accent); margin: 20px 0 8px 0; border-bottom: 1px solid var(--brd); padding-bottom: 4px; }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; margin-bottom: 16px; }
.data-table th { background: var(--bg-sec); padding: 8px; border: 1px solid var(--brd); color: var(--txt-sub); font-weight: 600; }
.data-table td { padding: 8px; border: 1px solid var(--brd); color: var(--txt); }
.f-group { margin-bottom: 16px; }
.f-label { display: block; font-size: 12px; color: var(--txt-sub); margin-bottom: 6px; font-weight: 600; }
.f-input, .f-textarea { width: 100%; padding: 12px; border: 1px solid var(--brd); border-radius: 8px; font-family: inherit; font-size: 14px; outline: none; background: var(--bg-sec); }
.f-input:focus, .f-textarea:focus { border-color: var(--accent); }
.f-textarea { resize: vertical; min-height: 100px; }
@media (max-width: 600px) { .nav-link { padding: 8px; font-size: 13px; } .stats-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<nav class="navbar">
  <a href="#home" class="nav-link active">Home</a>
  <a href="#filmo" class="nav-link">Filmography</a>
  <a href="#dash" class="nav-link">Dashboard</a>
  <a href="#gallery" class="nav-link">Gallery</a>
  <a href="#log" class="nav-link">Log</a>
</nav>

<section id="home">
  <!-- 이미지 주소 교체 필요 -->
  <img src="https://via.placeholder.com/180" alt="Jeong Hwi" class="hero-img">
  <div class="hero-title">정휘 관극 아카이브</div>
  <div class="total-count">총 <span id="display-total">0</span>회 관람</div>
</section>

<section id="filmo">
  <div class="section-header"><div class="section-title">Filmography</div></div>
  <div class="filmo-grid" id="filmo-container"></div>
</section>

<section id="dash">
  <div class="section-header"><div class="section-title">Dashboard</div></div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">도장판 연동 기록 (라져)</div><div class="stat-value" id="stat-auto">0회</div></div>
    <div class="stat-card"><div class="stat-label">이전 과거 기록 합산</div><div class="stat-value" id="stat-manual">0회</div></div>
  </div>
</section>

<section id="gallery">
  <div class="section-header">
    <div class="section-title">Gallery</div>
    <button class="btn" onclick="window.addVideoPrompt()">+ 영상 추가</button>
  </div>
  <div class="gallery-grid" id="gallery-container"></div>
</section>

<section id="log">
  <div class="section-header">
    <div class="section-title">Memory Log</div>
    <button class="btn" onclick="window.openLogModal()">+ 기록 작성</button>
  </div>
  <div class="timeline" id="log-container"></div>
</section>

<!-- 모달: 과거 극 상세 데이터 보기 -->
<div class="overlay" id="modal-past-show" onclick="if(event.target===this) window.closeModal('modal-past-show')">
  <div class="modal large">
    <div class="modal-title"><span id="ps-title">작품 이름</span><button class="modal-close" onclick="window.closeModal('modal-past-show')">✕</button></div>
    <div class="modal-subtitle">📊 배우별 관람 횟수</div><table class="data-table" id="ps-actor-table"></table>
    <div class="modal-subtitle">📍 좌석 히트맵 (다관람 좌석)</div><div id="ps-seat-table"></div>
    <div class="modal-subtitle">📅 관극 회차 상세</div><table class="data-table" id="ps-session-table"></table>
  </div>
</div>

<!-- 모달: 로그 작성 -->
<div class="overlay" id="modal-log">
  <div class="modal">
    <div class="modal-title">관극 기록 남기기</div>
    <div class="f-group"><label class="f-label">날짜</label><input type="date" id="log-date" class="f-input"></div>
    <div class="f-group"><label class="f-label">작품 및 회차</label><input type="text" id="log-title" class="f-input" placeholder="어떤 공연이었나요?"></div>
    <div class="f-group"><label class="f-label">메모 (애드립, 감상 등)</label><textarea id="log-memo" class="f-textarea" placeholder="오늘의 디테일을 기록해 보세요."></textarea></div>
    <div style="display: flex; gap: 10px; margin-top: 24px;">
      <button class="btn" style="flex: 1;" onclick="window.closeModal('modal-log')">취소</button>
      <button class="btn prim" style="flex: 1;" onclick="window.saveLog()">저장</button>
    </div>
  </div>
</div>

<script type="module">
  import { openPastShow } from './js/statCalculator.js';

  const targetActor = "정휘"; 

  // 필모그래피 & 대시보드 데이터 연동 세팅
  const filmography = [
    {
      title: "데카브리", char: "미하일 역",
      seasons: [ { name: "2025 시즌", type: "data", url: "./Filmography/dekabri_2025/data.json", title: "데카브리 (2025 시즌)" } ]
    },
    {
      title: "어쩌면 해피엔딩", char: "올리버 역",
      seasons: [ { name: "2025-2026 시즌", type: "data", url: "./Filmography/maybe_2025/data.json", title: "어쩌면 해피엔딩 (25-26)" } ]
    },
    {
      title: "엘리펀트 송", char: "마이클 역",
      seasons: [ { name: "2025-2026 시즌", type: "data", url: "./Filmography/elephant_2025/data.json", title: "엘리펀트 송 (25-26)" } ]
    },
    {
      title: "ROGER", char: "디디 역",
      seasons: [ { name: "2026 시즌", type: "link", url: "https://내가만든_라져_도장판_주소.com" } ] // 라져 주소 수정
    }
  ];

  // 대시보드가 통계를 내기 위해 긁어올 JSON 파일들
  const dataSources = [
    { type: 'past', url: './Filmography/dekabri_2025/data.json' },
    { type: 'past', url: './Filmography/maybe_2025/data.json' },
    { type: 'past', url: './Filmography/elephant_2025/data.json' },
    // 👇 라져 관극 후 백업 파일을 깃허브에 올리고 아래 주석을 풀어주세요.
    // { type: 'active', url: './ActiveShows/roger_backup.json' } 
  ];

  function renderFilmo() {
    const container = document.getElementById('filmo-container');
    const sorted = [...filmography].sort((a, b) => a.title.localeCompare(b.title));
    
    container.innerHTML = sorted.map(f => `
      <div class="filmo-card">
        <div class="filmo-title">${f.title}</div>
        <div class="filmo-char">${f.char}</div>
        <div class="season-list">
          ${f.seasons.map(s => {
            if(s.type === 'link') return `<a href="${s.url}" class="season-btn" target="_blank">${s.name} 도장판 →</a>`;
            else return `<button class="season-btn" onclick="window.triggerPastShow('${s.url}', '${s.title}')">${s.name} 데이터 보기 📊</button>`;
          }).join('')}
        </div>
      </div>
    `).join('');
  }

  async function updateDashboard() {
    let manualCount = 0; let autoCount = 0;
    try {
      for (const source of dataSources) {
        const response = await fetch(source.url);
        if (!response.ok) continue; 
        
        const data = await response.json();
        let isRogerBackup = data.records ? true : false;
        let sessions = data.records ? data.records : data.sessions;
        
        // 라져 데이터 필터링 (입구컷)
        if (isRogerBackup) {
          let grouped = {};
          sessions.forEach(r => {
            if (r.discount === '교환' || r.discount === '교환/나눔' || r.discount === '나눔') return;
            if (!r.seatZone || r.seatZone.trim() === "") return;
            let k = r.date + '_' + r.time;
            if (!grouped[k]) grouped[k] = [];
            grouped[k].push(r);
          });
          sessions = [];
          for (let k in grouped) {
            let grp = grouped[k];
            if (grp.length === 1) sessions.push(grp[0]);
            else { let seated = grp.find(x => x.seatRow !== "" && x.seatNum !== ""); sessions.push(seated || grp[0]); }
          }
        }

        sessions.forEach(s => {
          const hasActor = (s.cast && s.cast.includes(targetActor)) || (s.cast1 && s.cast1.includes(targetActor)) || (s.cast2 && s.cast2.includes(targetActor));
          if (hasActor) {
            if (source.type === 'past') manualCount++;
            else if (source.type === 'active') autoCount++;
          }
        });
      }
      document.getElementById('stat-manual').innerText = manualCount + "회";
      document.getElementById('stat-auto').innerText = autoCount + "회";
      document.getElementById('display-total').innerText = (manualCount + autoCount);
    } catch (error) { console.log("데이터 연동 오류", error); }
  }

  // 글로벌 등록
  window.triggerPastShow = (url, title) => { openPastShow(url, title); };
  window.closeModal = (id) => { document.getElementById(id).classList.remove('show'); };

  // 갤러리 로직
  let videos = JSON.parse(localStorage.getItem('hwi_videos')) || [];
  window.addVideoPrompt = () => {
    const url = prompt("유튜브 영상 링크를 붙여넣어 주세요.");
    if (!url) return;
    const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
    const videoId = (match && match[2].length === 11) ? match[2] : null;
    if (videoId) { videos.unshift(videoId); localStorage.setItem('hwi_videos', JSON.stringify(videos)); renderGallery(); } 
    else { alert("올바른 링크가 아닙니다."); }
  };
  window.deleteVideo = (idx) => { if(confirm("삭제할까요?")) { videos.splice(idx, 1); localStorage.setItem('hwi_videos', JSON.stringify(videos)); renderGallery(); } };
  function renderGallery() {
    const container = document.getElementById('gallery-container');
    if (videos.length === 0) { container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--txt-sub); padding: 40px;">등록된 영상이 없습니다.</div>`; return; }
    container.innerHTML = videos.map((id, idx) => `<div class="video-wrapper"><button class="delete-btn" onclick="window.deleteVideo(${idx})">✕</button><iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe></div>`).join('');
  }

  // 로그 로직
  let logs = JSON.parse(localStorage.getItem('hwi_logs')) || [];
  window.openLogModal = () => { document.getElementById('log-date').value = new Date().toISOString().split('T')[0]; document.getElementById('log-title').value = ""; document.getElementById('log-memo').value = ""; document.getElementById('modal-log').classList.add('show'); };
  window.saveLog = () => {
    const date = document.getElementById('log-date').value; const title = document.getElementById('log-title').value; const memo = document.getElementById('log-memo').value;
    if(!date || !title) return alert("날짜와 회차 정보는 필수입니다!");
    logs.push({ id: Date.now(), date, title, memo });
    logs.sort((a, b) => new Date(b.date) - new Date(a.date));
    localStorage.setItem('hwi_logs', JSON.stringify(logs));
    window.closeModal('modal-log'); renderLogs();
  };
  window.deleteLog = (id) => { if(confirm("삭제할까요?")) { logs = logs.filter(l => l.id !== id); localStorage.setItem('hwi_logs', JSON.stringify(logs)); renderLogs(); } };
  function renderLogs() {
    const container = document.getElementById('log-container');
    if (logs.length === 0) { container.innerHTML = `<div style="color: var(--txt-sub); padding: 20px 0;">기록이 없습니다.</div>`; return; }
    container.innerHTML = logs.map(l => `<div class="log-item"><div class="log-date">${l.date.replace(/-/g, '.')}</div><div class="log-content"><button class="log-del" onclick="window.deleteLog(${l.id})">삭제</button><div class="log-title">${l.title}</div><div class="log-memo">${l.memo}</div></div></div>`).join('');
  }

  // 스크롤 및 초기화
  window.addEventListener('scroll', () => {
    let current = '';
    document.querySelectorAll('section').forEach(sec => { if (pageYOffset >= (sec.offsetTop - 150)) current = sec.getAttribute('id'); });
    document.querySelectorAll('.nav-link').forEach(link => { link.classList.remove('active'); if (link.getAttribute('href').includes(current)) link.classList.add('active'); });
  });

  window.addEventListener('DOMContentLoaded', () => { renderFilmo(); updateDashboard(); renderGallery(); renderLogs(); });
</script>
</body>
</html>
