<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>정휘 아카이브</title>

<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&display=swap');

:root {
  /* 파스텔 하늘색 & 화이트 테마 */
  --bg: #ffffff; 
  --bg-sec: #f8fbff; 
  --bg-card: #ffffff;
  --brd: #e0f0ff;
  --txt: #334155; 
  --txt-sub: #64748b; 
  --txt-dim: #94a3b8;
  --accent: #38bdf8; 
  --accent-hov: #0ea5e9;
  --accent-dim: #e0f2fe;
  --nav-h: 60px;
  --shadow: 0 4px 20px rgba(56, 189, 248, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--txt); font-family: 'Pretendard', sans-serif; line-height: 1.6; overflow-x: hidden; }

/* NAVIGATION */
.navbar {
  position: fixed; top: 0; left: 0; width: 100%; height: var(--nav-h);
  background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--brd); z-index: 1000;
  display: flex; justify-content: center; align-items: center; gap: 20px;
}
.nav-link {
  color: var(--txt-sub); text-decoration: none; font-size: 14px; font-weight: 600;
  padding: 8px 12px; border-radius: 6px; transition: all 0.2s;
}
.nav-link:hover, .nav-link.active { color: var(--accent); background: var(--accent-dim); }

/* SECTIONS & COMMON */
section { min-height: 100vh; padding: calc(var(--nav-h) + 60px) 20px 60px; max-width: 800px; margin: 0 auto; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 2px solid var(--accent-dim); padding-bottom: 12px; }
.section-title { font-family: 'IBM Plex Sans KR', sans-serif; font-size: 24px; font-weight: 700; color: var(--txt); }

.btn { background: var(--bg-card); border: 1px solid var(--accent); color: var(--accent); padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; transition: 0.2s; font-family: inherit; text-decoration: none; display: inline-block; text-align: center; }
.btn:hover { background: var(--accent); color: #fff; }

/* 1. HERO SECTION */
#home { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
.hero-img { width: 180px; height: 180px; border-radius: 50%; background: var(--bg-sec); border: 3px solid var(--accent-dim); margin-bottom: 24px; object-fit: cover; box-shadow: var(--shadow); }
.hero-title { font-family: 'IBM Plex Sans KR', sans-serif; font-size: 32px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }

/* 2. FILMOGRAPHY */
.filmo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
.filmo-card { background: var(--bg-card); border: 1px solid var(--brd); border-radius: 16px; padding: 24px; box-shadow: var(--shadow); transition: transform 0.2s; }
.filmo-card:hover { transform: translateY(-5px); border-color: var(--accent); }
.filmo-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; color: var(--txt); }
.filmo-char { font-size: 14px; color: var(--accent); margin-bottom: 16px; font-weight: 600; }
.season-list { display: flex; flex-direction: column; gap: 8px; }
.season-btn { display: block; padding: 10px; background: var(--bg-sec); border: 1px solid var(--brd); color: var(--txt-sub); text-decoration: none; font-size: 13px; border-radius: 8px; transition: 0.2s; text-align: center; cursor: pointer; font-family: inherit; font-weight: 600; }
.season-btn:hover { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-dim); }

/* 3. DASHBOARD */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--bg-card); border: 1px solid var(--brd); border-radius: 16px; padding: 24px; text-align: center; box-shadow: var(--shadow); }
.stat-label { font-size: 13px; color: var(--txt-sub); margin-bottom: 8px; font-weight: 600; }
.stat-value { font-size: 20px; font-weight: 700; font-family: 'IBM Plex Sans KR', sans-serif; color: var(--accent); }

/* 4. GALLERY & 5. LOG (생략 - 이전과 동일) */
.gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }
.video-wrapper { position: relative; width: 100%; padding-bottom: 56.25%; border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--brd); }
.video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
.delete-btn { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.9); border: none; width: 28px; height: 28px; border-radius: 50%; color: #ef4444; cursor: pointer; z-index: 10; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.timeline { border-left: 2px solid var(--accent-dim); margin-left: 10px; padding-left: 24px; position: relative; }
.log-item { margin-bottom: 30px; position: relative; }
.log-item::before { content: ''; position: absolute; left: -31px; top: 4px; width: 12px; height: 12px; background: #fff; border: 3px solid var(--accent); border-radius: 50%; }
.log-date { font-size: 13px; color: var(--txt-sub); margin-bottom: 6px; font-weight: 600; }
.log-content { background: var(--bg-card); border: 1px solid var(--brd); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); position: relative; }
.log-title { font-weight: 700; margin-bottom: 8px; color: var(--txt); font-size: 16px; }
.log-memo { font-size: 14px; color: var(--txt-sub); line-height: 1.6; white-space: pre-wrap; }
.log-del { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--txt-dim); cursor: pointer; font-size: 12px; }

/* MODALS & TABLES */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(3px); }
.overlay.show { display: flex; }
.modal { background: var(--bg-card); width: 100%; max-width: 400px; padding: 24px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-height: 90vh; overflow-y: auto; }
.modal.large { max-width: 600px; }
.modal-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; color: var(--txt); display: flex; justify-content: space-between; align-items: center; }
.modal-close { background: none; border: none; font-size: 24px; color: var(--txt-dim); cursor: pointer; }
.modal-subtitle { font-size: 14px; font-weight: 700; color: var(--accent); margin: 20px 0 8px 0; border-bottom: 1px solid var(--brd); padding-bottom: 4px; }

.data-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; margin-bottom: 16px; }
.data-table th { background: var(--bg-sec); padding: 8px; border: 1px solid var(--brd); color: var(--txt-sub); font-weight: 600; }
.data-table td { padding: 8px; border: 1px solid var(--brd); color: var(--txt); }

/* 히트맵 뱃지 스타일 */
.heat-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 700; }
.heat-1 { background: #e0f2fe; color: #0284c7; }
.heat-2 { background: #bae6fd; color: #0369a1; }
.heat-3 { background: #7dd3fc; color: #075985; }
.heat-max { background: #38bdf8; color: #fff; }

.f-group { margin-bottom: 16px; }
.f-label { display: block; font-size: 12px; color: var(--txt-sub); margin-bottom: 6px; font-weight: 600; }
.f-input, .f-textarea { width: 100%; padding: 12px; border: 1px solid var(--brd); border-radius: 8px; font-family: inherit; font-size: 14px; outline: none; background: var(--bg-sec); }
</style>
</head>
<body>

<nav class="navbar">
  <a href="#home" class="nav-link active">Home</a>
  <a href="#filmo" class="nav-link">Filmography</a>
  <a href="#dash" class="nav-link">Dashboard</a>
  <a href="#gallery" class="nav-link">Gallery</a>
  <a href="#log" class="nav-link">Log</a>
</nav>

<section id="home">
  <!-- 이미지 링크 교체 -->
  <img src="https://via.placeholder.com/180" alt="Jeong Hwi" class="hero-img">
  <div class="hero-title">정휘 관극 아카이브</div>
</section>

<!-- 2. FILMOGRAPHY -->
<section id="filmo">
  <div class="section-header">
    <div class="section-title">Filmography</div>
  </div>
  <div class="filmo-grid" id="filmo-container"></div>
</section>

<!-- 3. DASHBOARD -->
<section id="dash">
  <div class="section-header">
    <div class="section-title">Dashboard</div>
  </div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">가장 많이 만난 캐릭터</div>
      <div class="stat-value">디디 (15회)</div> <!-- 추후 데이터 연동 -->
    </div>
    <div class="stat-card">
      <div class="stat-label">최다 방문 극장</div>
      <div class="stat-value">서경스퀘어 스콘 2관</div> <!-- 추후 데이터 연동 -->
    </div>
  </div>
</section>

<!-- 4. GALLERY -->
<section id="gallery">
  <div class="section-header">
    <div class="section-title">Gallery</div>
    <button class="btn" onclick="addVideoPrompt()">+ 영상 추가</button>
  </div>
  <div class="gallery-grid" id="gallery-container"></div>
</section>

<!-- 5. MEMORY LOG -->
<section id="log">
  <div class="section-header">
    <div class="section-title">Memory Log</div>
    <button class="btn" onclick="openLogModal()">+ 기록 작성</button>
  </div>
  <div class="timeline" id="log-container"></div>
</section>

<!-- 모달: 과거 극 상세 데이터 보기 -->
<div class="overlay" id="modal-past-show" onclick="if(event.target===this) closeModal('modal-past-show')">
  <div class="modal large">
    <div class="modal-title">
      <span id="ps-title">작품 이름</span>
      <button class="modal-close" onclick="closeModal('modal-past-show')">✕</button>
    </div>
    
    <div class="modal-subtitle">📊 배우별 관람 횟수</div>
    <table class="data-table" id="ps-actor-table"></table>

    <div class="modal-subtitle">📍 좌석 히트맵 (다관람 좌석)</div>
    <table class="data-table" id="ps-seat-table"></table>

    <div class="modal-subtitle">📅 관극 회차 상세</div>
    <table class="data-table" id="ps-session-table"></table>
  </div>
</div>

<!-- 모달: 로그 작성 -->
<div class="overlay" id="modal-log">
  <div class="modal">
    <div class="modal-title">관극 기록 남기기</div>
    <div class="f-group">
      <label class="f-label">날짜</label>
      <input type="date" id="log-date" class="f-input">
    </div>
    <div class="f-group">
      <label class="f-label">작품 및 회차 (예: 라져 밤공)</label>
      <input type="text" id="log-title" class="f-input" placeholder="어떤 공연이었나요?">
    </div>
    <div class="f-group">
      <label class="f-label">메모 (애드립, 감상 등)</label>
      <textarea id="log-memo" class="f-textarea" placeholder="오늘의 디테일을 기록해 보세요."></textarea>
    </div>
    <div style="display: flex; gap: 10px; margin-top: 24px;">
      <button class="btn" style="flex: 1;" onclick="closeModal('modal-log')">취소</button>
      <button class="btn btn-prim" style="flex: 1; background:var(--accent); color:#fff;" onclick="saveLog()">저장</button>
    </div>
  </div>
</div>

<script>
// ==========================================
// 💡 여기서부터 직접 데이터를 입력하는 곳입니다!
// ==========================================

// 1. 작품 기본 정보 세팅
// type: 'link' (도장판 사이트로 이동), type: 'data' (내부 모달로 띄우기)
// dataId에 적은 이름표를 바로 아래 pastShowsData에서 찾아서 띄워줍니다.
const filmography = [
  {
    title: "데카브리",
    char: "미하일 역",
    seasons: [ { name: "2025 시즌", type: "data", dataId: "dekabri_2025" } ]
  },
  {
    title: "어쩌면 해피엔딩",
    char: "올리버 역",
    seasons: [ { name: "2025-2026 시즌", type: "data", dataId: "maybe_2025" } ]
  },
  {
    title: "엘리펀트 송",
    char: "마이클 역",
    seasons: [ { name: "2025-2026 시즌", type: "data", dataId: "elephant_2025" } ]
  },
  {
    title: "ROGER",
    char: "디디 역",
    seasons: [ { name: "2026 시즌", type: "link", url: "https://내가만든_라져_도장판_주소.com" } ]
  }
];

// 2. 도장판이 없는 지나간 극의 상세 데이터 입력칸
// 아래 양식에 맞춰서 내용만 바꿔 적어주시면 됩니다!
const pastShowsData = {
  
  // [데이터 1] 데카브리 2025
  "dekabri_2025": {
    title: "데카브리 (2025 시즌)",
    
    // 배우별 횟수 입력
    actorStats: [
      { role: "미하일", actor: "정휘", count: 3 },
      { role: "뻬스쩨르", actor: "이진우", count: 2 },
      { role: "뻬스쩨르", actor: "김지철", count: 1 }
    ],
    
    // 좌석 히트맵 (많이 앉은 자리 순서대로 적어주세요)
    heatmaps: [
      { seat: "C구역 3열 12번", count: 2 },
      { seat: "B구역 1열 5번", count: 1 }
    ],
    
    // 관극 회차 상세
    sessions: [
      { date: "2025.10.10", time: "밤", cast: "정휘, 이진우", seat: "C구역 3열 12번" },
      { date: "2025.10.15", time: "낮", cast: "정휘, 김지철", seat: "B구역 1열 5번" },
      { date: "2025.10.20", time: "밤", cast: "정휘, 이진우", seat: "C구역 3열 12번" }
    ]
  },

  // [데이터 2] 어쩌면 해피엔딩 2025-2026
  "maybe_2025": {
    title: "어쩌면 해피엔딩 (2025-2026 시즌)",
    actorStats: [
      { role: "올리버", actor: "정휘", count: 5 },
      { role: "클레어", actor: "박진주", count: 3 },
      { role: "클레어", actor: "홍지희", count: 2 }
    ],
    heatmaps: [
      { seat: "1층 B구역 5열 10번", count: 3 },
      { seat: "1층 A구역 4열 3번", count: 2 }
    ],
    sessions: [
      { date: "2025.07.05", time: "밤", cast: "정휘, 박진주", seat: "1층 B구역 5열 10번" },
      // 필요한 만큼 아래에 계속 추가하세요.
    ]
  },

  // [데이터 3] 엘리펀트 송 2025-2026
  "elephant_2025": {
    title: "엘리펀트 송 (2025-2026 시즌)",
    actorStats: [
      { role: "마이클", actor: "정휘", count: 0 },
      { role: "그린버그", actor: "배우이름", count: 0 }
    ],
    heatmaps: [
      { seat: "좌석정보", count: 0 }
    ],
    sessions: [
      { date: "0000.00.00", time: "낮/밤", cast: "정휘, 상대배우", seat: "좌석정보" }
    ]
  }
};


// ==========================================
// 아래부터는 기능 구현 코드입니다. (수정 X)
// ==========================================
let videos = JSON.parse(localStorage.getItem('hwi_videos')) || [];
let logs = JSON.parse(localStorage.getItem('hwi_logs')) || [];

function init() {
  renderFilmo();
  renderGallery();
  renderLogs();
}

function renderFilmo() {
  const container = document.getElementById('filmo-container');
  filmography.sort((a, b) => a.title.localeCompare(b.title)); // 가나다순 자동 정렬
  
  container.innerHTML = filmography.map(f => `
    <div class="filmo-card">
      <div class="filmo-title">${f.title}</div>
      <div class="filmo-char">${f.char}</div>
      <div class="season-list">
        ${f.seasons.map(s => {
          if(s.type === 'link') {
            return `<a href="${s.url}" class="season-btn" target="_blank">${s.name} 도장판 →</a>`;
          } else {
            return `<button class="season-btn" onclick="openPastShow('${s.dataId}')">${s.name} 데이터 보기 📊</button>`;
          }
        }).join('')}
      </div>
    </div>
  `).join('');
}

// 과거 극 데이터 모달 열기
function openPastShow(dataId) {
  const data = pastShowsData[dataId];
  if(!data) return alert("데이터가 아직 입력되지 않았습니다.");

  document.getElementById('ps-title').innerText = data.title;

  // 배우별 횟수 테이블
  const actHtml = `<thead><tr><th>배역</th><th>배우</th><th>관람 횟수</th></tr></thead><tbody>` + 
    data.actorStats.map(a => `<tr><td>${a.role}</td><td style="font-weight:600;">${a.actor}</td><td style="color:var(--accent); font-weight:700;">${a.count}회</td></tr>`).join('') + 
    `</tbody>`;
  document.getElementById('ps-actor-table').innerHTML = actHtml;

  // 히트맵 테이블 (많이 앉은 자리)
  const getHeatClass = (c) => c >= 4 ? 'heat-max' : c === 3 ? 'heat-3' : c === 2 ? 'heat-2' : 'heat-1';
  const seatHtml = `<thead><tr><th>좌석 정보</th><th>착석 횟수</th></tr></thead><tbody>` + 
    data.heatmaps.sort((a,b)=>b.count - a.count).map(h => `<tr><td>${h.seat}</td><td><span class="heat-badge ${getHeatClass(h.count)}">${h.count}회</span></td></tr>`).join('') + 
    `</tbody>`;
  document.getElementById('ps-seat-table').innerHTML = seatHtml;

  // 세션(회차) 테이블
  const sessHtml = `<thead><tr><th>날짜</th><th>시간</th><th>캐스트</th><th>좌석</th></tr></thead><tbody>` + 
    data.sessions.map(s => `<tr><td>${s.date}</td><td>${s.time}</td><td style="font-weight:600;">${s.cast}</td><td style="font-size:12px;">${s.seat}</td></tr>`).join('') + 
    `</tbody>`;
  document.getElementById('ps-session-table').innerHTML = sessHtml;

  document.getElementById('modal-past-show').classList.add('show');
}

function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// 갤러리 로직
function getYouTubeId(url) {
  const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
  const match = url.match(regExp);
  return (match && match[2].length === 11) ? match[2] : null;
}
function addVideoPrompt() {
  const url = prompt("유튜브 영상 링크를 붙여넣어 주세요.");
  if (!url) return;
  const videoId = getYouTubeId(url);
  if (videoId) { videos.unshift(videoId); localStorage.setItem('hwi_videos', JSON.stringify(videos)); renderGallery(); } 
  else { alert("올바른 유튜브 링크가 아닙니다."); }
}
function deleteVideo(index) {
  if (confirm("삭제하시겠습니까?")) { videos.splice(index, 1); localStorage.setItem('hwi_videos', JSON.stringify(videos)); renderGallery(); }
}
function renderGallery() {
  const container = document.getElementById('gallery-container');
  if (videos.length === 0) { container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--txt-sub); padding: 40px;">등록된 영상이 없습니다.</div>`; return; }
  container.innerHTML = videos.map((id, index) => `<div class="video-wrapper"><button class="delete-btn" onclick="deleteVideo(${index})">✕</button><iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe></div>`).join('');
}

// 로그 로직
function openLogModal() {
  document.getElementById('log-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('log-title').value = ""; document.getElementById('log-memo').value = "";
  document.getElementById('modal-log').classList.add('show');
}
function saveLog() {
  const date = document.getElementById('log-date').value; const title = document.getElementById('log-title').value; const memo = document.getElementById('log-memo').value;
  if(!date || !title) return alert("날짜와 회차 정보는 필수입니다!");
  logs.push({ id: Date.now(), date, title, memo });
  logs.sort((a, b) => new Date(b.date) - new Date(a.date));
  localStorage.setItem('hwi_logs', JSON.stringify(logs));
  closeModal('modal-log'); renderLogs();
}
function deleteLog(id) {
  if (confirm("기록을 삭제하시겠습니까?")) { logs = logs.filter(log => log.id !== id); localStorage.setItem('hwi_logs', JSON.stringify(logs)); renderLogs(); }
}
function renderLogs() {
  const container = document.getElementById('log-container');
  if (logs.length === 0) { container.innerHTML = `<div style="color: var(--txt-sub); padding: 20px 0;">아직 남겨진 기록이 없습니다.</div>`; return; }
  container.innerHTML = logs.map(log => `<div class="log-item"><div class="log-date">${log.date.replace(/-/g, '.')}</div><div class="log-content"><button class="log-del" onclick="deleteLog(${log.id})">삭제</button><div class="log-title">${log.title}</div><div class="log-memo">${log.memo}</div></div></div>`).join('');
}

window.addEventListener('scroll', () => {
  let current = '';
  document.querySelectorAll('section').forEach(sec => { if (pageYOffset >= (sec.offsetTop - 150)) current = sec.getAttribute('id'); });
  document.querySelectorAll('.nav-link').forEach(link => { link.classList.remove('active'); if (link.getAttribute('href').includes(current)) link.classList.add('active'); });
});

window.onload = init;
</script>
</body>
</html>
